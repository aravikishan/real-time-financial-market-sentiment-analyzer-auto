<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Financial Market Sentiment Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/sentiment">Sentiment</a>
            <a href="/api-docs">API Docs</a>
            <a href="/about">About Us</a>
        </nav>
    </header>
    <main class="container">
        <h1 class="mt-5">Welcome to the Real-Time Financial Market Sentiment Analyzer</h1>
        <p>Analyze real-time data streams from financial news and social media to assess market sentiment for various stocks.</p>
        <form action="/sentiment" method="get">
            <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="Enter stock symbol" name="stock_symbol" required>
                <button class="btn btn-primary" type="submit">Analyze</button>
            </div>
        </form>
    </main>
    <footer>
        <p>&copy; 2023 Financial Market Sentiment Analyzer</p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
